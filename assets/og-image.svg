<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d47a1"/>
      <stop offset="55%"  stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#1e88e5"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5cb85c"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="950" cy="-80" r="320" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1100" cy="500" r="200" fill="rgba(92,184,92,0.08)"/>
  <circle cx="-60" cy="400" r="260" fill="rgba(255,255,255,0.03)"/>

  <!-- Green accent bar left -->
  <rect x="72" y="100" width="6" height="430" rx="3" fill="url(#greenGrad)" opacity="0.8"/>

  <!-- Company badge top -->
  <rect x="96" y="88" width="260" height="36" rx="18" fill="rgba(92,184,92,0.2)" stroke="rgba(92,184,92,0.5)" stroke-width="1"/>
  <circle cx="116" cy="106" r="5" fill="#5cb85c"/>
  <text x="130" y="112" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="2">ENROZ FINANCIAL SOLUTION</text>

  <!-- Main headline -->
  <text x="96" y="210" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="white" opacity="0.97">Complete Accounting</text>
  <text x="96" y="295" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="rgba(144,202,249,0.95)" font-style="italic">&amp; Compliance</text>
  <text x="96" y="375" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="white" opacity="0.97">for Nepal SMEs</text>

  <!-- Subheadline -->
  <text x="96" y="428" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.65)" font-weight="300">Bookkeeping · VAT · TDS · Payroll · Company Returns — One Monthly Fee</text>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <rect x="96" y="468" width="180" height="80" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="186" y="505" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#5cb85c" text-anchor="middle">100%</text>
  <text x="186" y="528" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="400">Filing Guarantee</text>

  <!-- Stat 2 -->
  <rect x="292" y="468" width="180" height="80" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="382" y="505" font-family="Georgia, serif" font-size="32" font-weight="700" fill="rgba(144,202,249,0.9)" text-anchor="middle">24hr</text>
  <text x="382" y="528" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">Express Service</text>

  <!-- Stat 3 -->
  <rect x="488" y="468" width="180" height="80" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="578" y="505" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#5cb85c" text-anchor="middle">50%</text>
  <text x="578" y="528" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">First Month Off</text>

  <!-- Stat 4 -->
  <rect x="684" y="468" width="200" height="80" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="784" y="505" font-family="Georgia, serif" font-size="32" font-weight="700" fill="rgba(144,202,249,0.9)" text-anchor="middle">NPR 7,500</text>
  <text x="784" y="528" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">Starting / Month</text>

  <!-- Right side card -->
  <rect x="920" y="120" width="220" height="390" rx="20" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  
  <!-- Card content -->
  <text x="1030" y="165" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">SERVICES</text>
  
  <text x="946" y="208" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">📒  Bookkeeping</text>
  <text x="946" y="244" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">🧾  VAT &amp; TDS Returns</text>
  <text x="946" y="280" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">💰  Income Tax</text>
  <text x="946" y="316" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">👥  Payroll &amp; SSF</text>
  <text x="946" y="352" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">🏛️  Company Returns</text>
  
  <!-- Divider -->
  <line x1="940" y1="372" x2="1120" y2="372" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  
  <!-- Express badge -->
  <rect x="940" y="384" width="160" height="34" rx="8" fill="rgba(92,184,92,0.2)" stroke="rgba(92,184,92,0.4)" stroke-width="1"/>
  <text x="1020" y="406" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#5cb85c" text-anchor="middle">⚡  24-Hour Express</text>

  <!-- Bottom domain bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="96" y="616" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" font-weight="400">🌐  www.enrozfinancial.com</text>
  <text x="1104" y="616" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.4)" text-anchor="end">📍 Kathmandu, Nepal</text>
</svg>
